app = 'talkrai-frontend'
primary_region = 'sin'

[build.args]
  NEXT_PUBLIC_LIFF_ID = "2009434682-pfXCyzxv"
  NEXT_PUBLIC_API_URL = "https://api.talkrai.app"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[[http_service.checks]]
  grace_period = "10s"
  interval = "30s"
  method = "GET"
  timeout = "5s"
  path = "/api/health"

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
